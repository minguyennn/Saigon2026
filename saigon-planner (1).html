  body.appendChild(el('<div class="htop">'+glyph(glyphFor(stop))+
    '<h3 contenteditable="true" data-f="title">'+esc(stop.title)+'</h3></div>'));

  /* delete one note, with an undo window */
  function delLine(l){
    var i = stop.lines.indexOf(l); if(i < 0) return;
    var removed = stop.lines.splice(i,1)[0];
    render();
    toast('Note deleted', 'Undo', function(){ stop.lines.splice(i,0,removed); render(); });
  }

  /* lines: title line, notes, warnings and tags stay visible; extra prose folds away */
  var lines = stop.lines || [], shownFirst = false, hidden = [];

  function lineNode(l){
    var kind = l.ln?'ln':l.note?'note':l.bu?'bu':l.warn?'warn':
               l.meta?'meta':l.book?'book':l.ghost?'ghost':(l.link!==undefined?'link':null);
    if(!kind) return null;
    var isChip = (kind==='meta'||kind==='book'||kind==='ghost'||kind==='link');
    var inner;
    if (kind==='ln')       inner = el('<p class="ln" contenteditable="true">'+linkify(esc(l.ln))+'</p>');
    else if (kind==='note')inner = el('<p class="note" contenteditable="true">'+linkify(esc(l.note))+'</p>');
    else if (kind==='bu')  inner = el('<p class="bu" contenteditable="true">'+linkify(esc(l.bu))+'</p>');
    else if (kind==='warn')inner = el('<p class="warn" contenteditable="true">'+esc(l.warn)+'</p>');
    else if (kind==='meta')inner = el('<span class="meta" contenteditable="true">'+esc(l.meta)+'</span>');
    else if (kind==='book')inner = el('<span class="meta book" contenteditable="true">'+esc(l.book)+'</span>');
    else if (kind==='ghost')inner= el('<span class="meta ghost" contenteditable="true">'+esc(l.ghost)+'</span>');
    else {                 /* a named link */
      inner = el('<span class="meta lk"></span>');
      var lab  = el('<span class="lktext" contenteditable="true">'+esc(l.link||'Link')+'</span>');
      var go   = el('<a class="lkgo" target="_blank" rel="noopener" title="Open">\u2197</a>');
      var setu = el('<button class="lkset" type="button" title="Change the address">url</button>');
      go.href = l.url || '#';
      lab.addEventListener('blur', function(){ l.link = lab.textContent; });
      go.addEventListener('click', function(e){
        if(!l.url){ e.preventDefault(); toast('No address set yet — tap url'); }
      });
      setu.addEventListener('click', function(){
        var u = prompt('Web address for \u201c'+lab.textContent+'\u201d', l.url || 'https://');
        if(u===null) return;
        l.url = u.trim(); go.href = l.url || '#'; toast(l.url ? 'Link saved' : 'Link cleared');
      });
      inner.appendChild(lab); inner.appendChild(go); inner.appendChild(setu);
    }
    if(kind!=='link') inner.addEventListener('blur', function(){ l[kind] = inner.textContent; });

    var wrap = el(isChip ? '<span class="lw chip"></span>' : '<div class="lw"></div>');
    var x = el('<button class="xdel" type="button" title="Delete this line" aria-label="Delete this line">\u00d7</button>');
    x.addEventListener('click', function(){
      lines.splice(lines.indexOf(l),1); render();
      toast(kind==='note' ? 'Note deleted' : 'Line deleted');
    });
    wrap.appendChild(inner); wrap.appendChild(x);
    wrap._kind = kind;
    return wrap;
  }

  lines.forEach(function(l){
    var wrap = lineNode(l); if(!wrap) return;
    var kind = wrap._kind;
    var always = (kind!=='ln' && kind!=='bu') || (kind==='ln' && !shownFirst);
    if(kind==='ln' && !shownFirst) shownFirst = true;
    if(!always){ wrap.style.display='none'; hidden.push(wrap); }
    body.appendChild(wrap);
  });

  if(hidden.length){
    var more = el('<button class="more" aria-expanded="false">+ '+hidden.length+' more</button>');
    more.addEventListener('click', function(){
      var open = more.getAttribute('aria-expanded')==='true';
      hidden.forEach(function(x){ x.style.display = open ? 'none' : ''; });
      more.setAttribute('aria-expanded', open?'false':'true');
      more.textContent = open ? ('+ '+hidden.length+' more') : 'Show less';
    });
    body.appendChild(more);
  }

  /* add-a-line tray */
  var tray = el('<div class="tray"></div>');
  [['+ note',      {note:'New note'}],
   ['+ address',   {meta:'Street address'}],
   ['+ hours',     {ghost:'00:00\u201300:00'}],
   ['+ distance',  {ghost:'0 min walk'}],
   ['+ link',      '__LINK__'],
   ['+ booking',   {book:'Reserve \u00d7 5'}],
   ['+ warning',   {warn:'Something to watch for'}],
   ['+ paragraph', {ln:'New paragraph'}]
  ].forEach(function(spec){
    var b = el('<button type="button"'+(spec[0]==='+ warning'?' class="dang"':'')+'>'+spec[0]+'</button>');
    b.addEventListener('click', function(){
      stop.lines = stop.lines || [];
      if(spec[1]==='__LINK__'){
        var label = prompt('What should the link say?', 'Map');
        if(label===null) return;
        var url = prompt('Web address', 'https://');
        if(url===null) return;
        stop.lines.push({link:label.trim()||'Link', url:url.trim()});
      } else {
        stop.lines.push(JSON.parse(JSON.stringify(spec[1])));
      }
      render(); toast('Added \u2014 click it to edit');
    });
    tray.appendChild(b);
  });
  body.appendChild(tray);

  var tools = el('<div class="rowtools"></div>');
  var del = el('<button>delete stop</button>');
  del.addEventListener('click', function(){
    var i = day.stops.indexOf(stop); if(i < 0) return;
    var removed = day.stops.splice(i,1)[0];
    render(); paintTally(); syncHash();
    toast('"'+removed.title+'" deleted', 'Undo', function(){
      day.stops.splice(i,0,removed); render(); paintTally(); syncHash();
    });
  });
  tools.appendChild(del);
  body.appendChild(tools);

  body.addEventListener('blur', function(e){
    var f = e.target.getAttribute && e.target.getAttribute('data-f');
    if(f){ stop[f] = e.target.textContent.trim(); if(f==='t'){ paintNow(); } }
  }, true);

  n.appendChild(body);
  return n;
}

/* ---------- render: appendix table ---------- */
function tableNode(t){
  var wrap = document.createDocumentFragment();
  if(t.h!==undefined) wrap.appendChild(bindEdit(el('<h3 class="sub">'+esc(t.h)+'</h3>'), t, 'h'));
  var head = t.cols.filter(function(c){return c;}).length
    ? '<thead><tr>'+t.cols.map(function(c,i){
        return '<th contenteditable="true" data-col="'+i+'">'+esc(c)+'</th>';}).join('')+'</tr></thead>' : '';
  var body = t.rows.map(function(r){
    return '<tr>'+r.map(function(c,ci){
      var lab = t.cols[ci] ? ' data-label="'+esc(t.cols[ci])+'"' : '';
      return '<td'+lab+' contenteditable="true">'+linkify(esc(c)).replace(/ON PLAN ([A-Za-z]+)/,
        '<span class="onplan">ON PLAN $1</span>')+'</td>';
    }).join('')+'</tr>';
  }).join('');
  var tbl = el('<table>'+head+'<tbody>'+body+'</tbody></table>');
  tbl.addEventListener('blur', function(e){
    var ci = e.target.getAttribute && e.target.getAttribute('data-col');
    if(ci!==null && ci!==undefined) t.cols[+ci] = e.target.textContent.trim();
  }, true);
  wrap.appendChild(tbl);
  return wrap;
}

/* ---------- render ---------- */
var manageTabs = false;
function tabButton(label, id, onPick, onKill){
  var wrap = el('<span style="position:relative;flex:0 0 auto;display:inline-flex"></span>');
  var b = el('<button aria-current="'+(view===id?'true':'false')+'">'+esc(label)+'</button>');
  b.addEventListener('click', onPick);
  wrap.appendChild(b);
  if(manageTabs && onKill){
    var k = el('<button title="Remove this tab" aria-label="Remove '+esc(label)+'" '+
      'style="margin-left:3px;border:1px solid var(--red);color:var(--red);'+
      'padding:7px 7px;border-radius:2px;font-family:\'JetBrains Mono\',monospace;font-size:10px">\u00d7</button>');
    k.addEventListener('click', onKill);
    wrap.appendChild(k);
  }
  return wrap;
}

function render(){
  tabs.innerHTML='';
  DATA.days.forEach(function(d){
    tabs.appendChild(tabButton(
      d.date.split(' ')[0].slice(0,3).toUpperCase(), d.id,
      function(){ view=d.id; render(); window.scrollTo(0,0); },
      function(){
        if(!confirm('Remove '+d.date+' from the plan?')) return;
        DATA.days.splice(DATA.days.indexOf(d),1);
        if(view===d.id) view = (DATA.days[0]||{}).id || 'eat';
        render(); paintTally();
      }));
  });
  if(DATA.mustEat){
    tabs.appendChild(tabButton('MUST-EAT','eat',
      function(){ view='eat'; render(); window.scrollTo(0,0); },
      function(){ if(!confirm('Remove the must-eat tab?')) return;
        delete DATA.mustEat; if(view==='eat') view=DATA.days[0].id; render(); }));
  }
  DATA.appendix.forEach(function(a){
    tabs.appendChild(tabButton(a.label.toUpperCase(), a.id,
      function(){ view=a.id; render(); window.scrollTo(0,0); },
      function(){
        if(!confirm('Remove the "'+a.label+'" tab?')) return;
        DATA.appendix.splice(DATA.appendix.indexOf(a),1);
        if(view===a.id) view = DATA.days[0].id;
        render();
      }));
  });
  var mt = el('<button title="Add or remove tabs" style="flex:0 0 auto">'+
    (manageTabs?'DONE':'EDIT TABS')+'</button>');
  if(manageTabs) mt.setAttribute('aria-current','true');
  mt.addEventListener('click', function(){ manageTabs=!manageTabs; render(); });
  tabs.appendChild(mt);

  app.innerHTML='';
  var day = DATA.days.filter(function(d){return d.id===view;})[0];

  if(day){
    document.documentElement.style.setProperty('--day','var(--'+day.color+')');
    var dn = counts(), sd = day.stops.filter(function(s){return s.done;}).length;
    var head = el('<div class="dayhead">'+
      '<div class="k" contenteditable="true">'+esc(day.kicker)+'</div>'+
      '<h2 contenteditable="true">'+esc(day.date)+'</h2>'+
      '<p contenteditable="true">'+esc(day.sub)+'</p>'+
      '<div class="daybar"><span>'+sd+'/'+day.stops.length+'</span>'+
      '<span class="track"><span class="fill" style="width:'+
      (day.stops.length? sd/day.stops.length*100:0)+'%"></span></span></div></div>');
    head.addEventListener('blur', function(e){
      if(e.target.tagName==='H2') day.date=e.target.textContent.trim();
      if(e.target.tagName==='P')  day.sub =e.target.textContent.trim();
      if(e.target.className==='k') day.kicker=e.target.textContent.trim();
    }, true);
    app.appendChild(head);

    /* four-column strip: the day at a glance */
    var times = day.stops.map(function(s){return s.t;}).sort();
    var food  = day.stops.filter(function(s){return s.kind==='food';});
    var moves = day.stops.filter(function(s){return s.kind==='move';}).length;
    var strip = el('<div class="strip">'+
      '<div><b>Stops</b><span>'+day.stops.length+'</span><em>'+sd+' ticked</em></div>'+
      '<div><b>Eating</b><span>'+food.length+'</span><em>'+(food.length?food[0].t+' first':'—')+'</em></div>'+
      '<div><b>In a car</b><span>'+moves+'</span><em>'+(moves?'else on foot':'all on foot')+'</em></div>'+
      '<div><b>Runs</b><span>'+(times[0]||'—')+'</span><em>till '+(times[times.length-1]||'—')+'</em></div>'+
      '</div>');
    app.appendChild(strip);

    var chips = el('<div class="chips"></div>');
    [['all','Everything'],['food','Food'],['see','See & do'],['rest','Rest'],['opt','Optional']]
    .forEach(function(f){
      var b = el('<button aria-pressed="'+(filter===f[0]?'true':'false')+'">'+f[1]+'</button>');
      b.addEventListener('click', function(){ filter = (filter===f[0]?'all':f[0]); render(); });
      chips.appendChild(b);
    });
    app.appendChild(chips);

    var shown = 0;
    day.stops.forEach(function(s){
      if(filter!=='all' && s.kind!==filter && !(filter==='see'&&s.kind==='move')) return;
      shown++; app.appendChild(stopNode(s, day));
    });
    if(!shown) app.appendChild(el('<p class="lede" style="padding-top:18px">Nothing in this day matches that filter. Tap the chip again to see everything.</p>'));

    var add = el('<button class="addstop">+ ADD A STOP TO THIS DAY</button>');
    add.addEventListener('click', function(){
      day.stops.push({t:'12:00',tag:'New',kind:'food',title:'New stop',done:false,
        lines:[{ln:'Click any text to edit it.'}]});
      filter='all'; render(); paintTally();
    });
    app.appendChild(add);
    app.appendChild(el('<div class="hint">Tap any text to edit it — on the coloured header the panel darkens while you type so white text stays readable. Every note has a <b>\u00d7</b> to delete it, and every delete offers <b>Undo</b> for a few seconds. Use the pills under each stop to add a <b>note</b> (italic), an <b>address</b>, <b>hours</b>, a <b>distance</b>, a <b>booking</b>, a <b>warning</b> or a <b>link</b>. Any web address you paste into a paragraph turns into a tappable link on its own. The small × on any line deletes just that line. Long entries fold behind <b>+ more</b>. Hit <b>Save copy</b> to download a file with your edits baked in.</div>'));
    paintHero(day.id); paintTally(); paintNow(); return;
  }

  if(view==='eat'){
    DATA.eatMeta = DATA.eatMeta || {title:'The must-eat list',
      lede:'Everything you named has a day. This is the scoreboard.'};
    var head = el('<div class="aphead"><div class="k">Scoreboard</div>'+
      '<h2 contenteditable="true"></h2><p contenteditable="true"></p></div>');
    head.querySelector('h2').textContent = DATA.eatMeta.title;
    head.querySelector('p').textContent  = DATA.eatMeta.lede;
    bindEdit(head.querySelector('h2'), DATA.eatMeta, 'title');
    bindEdit(head.querySelector('p'),  DATA.eatMeta, 'lede');
    app.appendChild(head);
    var wrapx = el('<div class="apx"></div>'); app.appendChild(wrapx);

    var tick = el('<p class="lede"></p>');
    function score(){
      tick.textContent = DATA.mustEat.filter(function(m){return m[2];}).length +
        ' of ' + DATA.mustEat.length + ' ticked off.';
    }
    score(); wrapx.appendChild(tick);

    var g = el('<div class="eatgrid"></div>');
    DATA.mustEat.forEach(function(m){
      var row = el('<div class="eat'+(m[2]?' on':'')+'"></div>');
      var b = el('<button class="tick" role="checkbox" aria-checked="'+(m[2]?'true':'false')+
        '" aria-label="Tick '+esc(m[0])+'">'+TICK+'</button>');
      var lab = bindEdit(el('<label>'+esc(m[0])+'</label>'), m, 0);
      var dtag= el('<span class="d" contenteditable="true">'+esc(m[1])+'</span>');
      dtag.addEventListener('blur', function(){ m[1]=dtag.textContent.trim(); });
      b.addEventListener('click', function(){
        m[2]=!m[2]; b.setAttribute('aria-checked', m[2]?'true':'false');
        row.classList.toggle('on', m[2]); score(); syncHash();
      });
      var x = el('<button class="xdel" type="button" title="Remove">\u00d7</button>');
      x.addEventListener('click', function(){
        DATA.mustEat.splice(DATA.mustEat.indexOf(m),1); render();
      });
      row.appendChild(b); row.appendChild(lab); row.appendChild(dtag); row.appendChild(x);
      g.appendChild(row);
    });
    wrapx.appendChild(g);
    var add = el('<button class="addline">+ ADD SOMETHING TO EAT</button>');
    add.addEventListener('click', function(){
      DATA.mustEat.push(['New dish','—',false]); render();
      toast('Added \u2014 click it to rename');
    });
    wrapx.appendChild(add);
    paintHero('eat'); paintTally(); paintNow(); return;
  }

  var ap = DATA.appendix.filter(function(a){return a.id===view;})[0];
  if(ap){
    var head = el('<div class="aphead"><div class="k" contenteditable="true">'+
      esc(ap.kicker||'Reference')+'</div><h2 contenteditable="true"></h2>'+
      '<p contenteditable="true"></p></div>');
    head.querySelector('h2').textContent = ap.title;
    head.querySelector('p').textContent  = ap.lede;
    bindEdit(head.querySelector('h2'), ap, 'title');
    bindEdit(head.querySelector('p'),  ap, 'lede');
    bindEdit(head.querySelector('.k'), ap, 'kicker');
    app.appendChild(head);

    var box = el('<div class="apx"></div>'); app.appendChild(box);

    /* neighbourhood notes */
    (ap.districts||[]).forEach(function(d){
      var c = el('<div class="dist"></div>');
      c.appendChild(bindEdit(el('<h4>'+esc(d.n)+'</h4>'), d, 'n'));
      c.appendChild(bindEdit(el('<p class="vn">'+esc(d.vn)+'</p>'), d, 'vn'));
      d.p.forEach(function(_,pi){
        var para = el('<p>'+linkify(esc(d.p[pi]))+'</p>');
        para.setAttribute('contenteditable','true');
        para.addEventListener('blur', function(){ d.p[pi]=para.textContent.trim(); });
        c.appendChild(para);
      });
      box.appendChild(c);
    });

    /* dish explainers */
    (ap.dishcards||[]).forEach(function(k){
      var c = el('<div class="dish"></div>');
      c.appendChild(bindEdit(el('<p class="ph">'+esc(k.p)+'</p>'), k, 'p'));
      c.appendChild(bindEdit(el('<h4>'+esc(k.n)+'</h4>'), k, 'n'));
      c.appendChild(bindEdit(el('<p class="en">'+esc(k.e)+'</p>'), k, 'e'));
      var dl = el('<dl></dl>');
      [['What it is','w'],['Why it matters','f'],['Variations','v']].forEach(function(pair){
        dl.appendChild(el('<dt>'+pair[0]+'</dt>'));
        dl.appendChild(bindEdit(el('<dd>'+linkify(esc(k[pair[1]]))+'</dd>'), k, pair[1]));
      });
      c.appendChild(dl);
      c.appendChild(bindEdit(el('<p class="where">'+linkify(esc(k.where))+'</p>'), k, 'where'));
      var x = el('<button class="more" style="color:var(--red)">Remove this dish</button>');
      x.addEventListener('click', function(){
        if(!confirm('Remove '+k.n+'?')) return;
        ap.dishcards.splice(ap.dishcards.indexOf(k),1); render();
      });
      c.appendChild(x);
      box.appendChild(c);
    });
    if(ap.dishcards){
      var addD = el('<button class="addline">+ ADD A DISH</button>');
      addD.addEventListener('click', function(){
        ap.dishcards.push({n:'New dish',p:'pronunciation',e:'English name',
          w:'What is in it.',f:'Why it matters.',v:'Variations.',where:'Where to eat it.'});
        render(); toast('Added \u2014 click any line to edit');
      });
      box.appendChild(addD);
    }

    /* checklists */
    (ap.checks||[]).forEach(function(c){
      box.appendChild(bindEdit(el('<h3 class="sub">'+esc(c.h)+'</h3>'), c, 'h'));
      var g = el('<div class="eatgrid"></div>');
      c.items.forEach(function(it){
        var row = el('<div class="eat'+(it[1]?' on':'')+'"></div>');
        var b = el('<button class="tick" role="checkbox" aria-checked="'+(it[1]?'true':'false')+
          '" aria-label="Tick '+esc(it[0])+'">'+TICK+'</button>');
        var lab = bindEdit(el('<label>'+esc(it[0])+'</label>'), it, 0);
        b.addEventListener('click', function(){
          it[1]=!it[1]; b.setAttribute('aria-checked', it[1]?'true':'false');
          row.classList.toggle('on', it[1]); syncHash();
        });
        var x = el('<button class="xdel" type="button" title="Remove">\u00d7</button>');
        x.addEventListener('click', function(){ c.items.splice(c.items.indexOf(it),1); render(); });
        row.appendChild(b); row.appendChild(lab); row.appendChild(x);
        g.appendChild(row);
      });
      box.appendChild(g);
      var addI = el('<button class="addline">+ ADD TO THIS LIST</button>');
      addI.addEventListener('click', function(){ c.items.push(['New item',false]); render(); });
      box.appendChild(addI);
    });

    (ap.tables||[]).forEach(function(t){
      box.appendChild(tableNode(t));
      var addR = el('<button class="addline">+ ADD A ROW</button>');
      addR.addEventListener('click', function(){
        t.rows.push(t.cols.map(function(){return 'New';})); render();
      });
      box.appendChild(addR);
    });

    box.appendChild(el('<div class="hint">This is a reference page, not a schedule \u2014 nothing here is booked. '+
      'Every heading, note and cell is editable, and the pills add new rows. '+
      'Paste a web address anywhere and it becomes tappable.</div>'));
    paintHero(ap.id); paintTally(); paintNow();
  }
}

/* ---------- share link (ticks only) ---------- */
function syncHash(){
  var bits = allStops().map(function(s){return s.done?'1':'0';})
    .concat(DATA.mustEat.map(function(m){return m[2]?'1':'0';})).join('');
  try{ history.replaceState(null,'','#t='+bits); }catch(e){}
}
function readHash(){
  var m = /#t=([01]+)/.exec(location.hash); if(!m) return;
  var bits = m[1], st = allStops(), i = 0;
  st.forEach(function(s){ s.done = bits[i++]==='1'; });
  DATA.mustEat.forEach(function(x){ x[2] = bits[i++]==='1'; });
}

/* ---------- save a copy ---------- */
document.getElementById('btnSave').addEventListener('click', function(){
  var doc = document.documentElement.cloneNode(true);
  doc.querySelector('#trip-data').textContent = JSON.stringify(DATA);
  var app2 = doc.querySelector('#app'); if(app2) app2.innerHTML='';
  var blob = new Blob(['<!DOCTYPE html>\n'+doc.outerHTML], {type:'text/html'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'saigon-planner.html';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(function(){ URL.revokeObjectURL(a.href); }, 1500);
  toast('Downloaded. Send that file to everyone.');
});
document.getElementById('btnShare').addEventListener('click', function(){
  syncHash();
  var url = location.href;
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(function(){ toast('Link copied — it carries your ticks'); },
      function(){ toast('Copy the address bar — it carries your ticks'); });
  } else { toast('Copy the address bar — it carries your ticks'); }
});

/* hero wordmark + subheader are yours to edit, and they save with the file */
DATA.hero = DATA.hero || {};
(function(){
  var t=document.getElementById('heroTitle'), s=document.getElementById('heroSub');
  if(DATA.hero.title) t.textContent = DATA.hero.title;
  if(DATA.hero.sub)   s.innerHTML   = DATA.hero.sub;
  t.addEventListener('blur', function(){ DATA.hero.title = t.textContent.trim(); });
  s.addEventListener('blur', function(){ DATA.hero.sub   = s.innerHTML; });
})();

readHash(); render(); paintTally(); paintNow();
})();
</script>
